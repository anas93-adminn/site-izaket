<html lang="fr"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — Izaka't</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-page">

  <div class="login-blob"></div>
  <div class="login-blob2"></div>

  <div class="login-container">

    <a href="index.html" class="back-home">
      ← Retour à l'accueil
    </a>

    <h1 class="login-title">
      Crée ton compte 🚀
    </h1>

    <p class="login-subtitle">
      Inscris-toi pour rejoindre les cours, la communauté et tes professeurs.
    </p>

    <form id="registerForm" class="login-form">

      <input type="text" id="username" placeholder="Nom" required="">

      <input type="email" id="email" placeholder="Adresse email" required="">

      <input type="password" id="password" placeholder="Mot de passe" required="">

      <button type="submit" class="btn-primary">
        S'inscrire
      </button>

    </form>

    <p id="message"></p>

    <div class="login-footer">
      Déjà un compte ?
      <a href="login.html">
        Se connecter
      </a>
    </div>

  </div>

  <script src="register.js"></script>


</body></html>
